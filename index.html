<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인스타 아이디 생성기 | ITmanual.net</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .animate-fade-in-up { animation: fadeInUp 0.6s ease-out forwards; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    /* 숨김 처리용 유틸리티 클래스 */
    .hidden-custom { display: none !important; }
  </style>
</head>
<body class="min-h-screen bg-[#fafafa] flex flex-col items-center py-10 px-4 sm:px-6 lg:px-8 font-sans text-gray-900 selection:bg-pink-200">

  <!-- Header -->
  <div class="text-center max-w-2xl w-full mb-8">
    <div class="inline-flex items-center justify-center p-3 bg-gradient-to-tr from-yellow-400 via-pink-500 to-purple-600 rounded-2xl shadow-lg shadow-pink-200 mb-6 transform -rotate-3 hover:rotate-0 transition-transform">
      <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
    </div>
    <h1 class="text-4xl sm:text-5xl font-extrabold tracking-tight text-gray-900 mb-4">
      Gen<span class="text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-600">ID</span>
    </h1>
    <p class="text-lg text-gray-600 max-w-lg mx-auto leading-relaxed">
      AI가 분석하는 나의 바이브 🔮<br/>세상에 하나뿐인 유니크한 인스타 아이디를 만들어보세요.
    </p>
  </div>

  <div class="w-full max-w-2xl grid grid-cols-1 gap-8">
    <!-- Main Form Card -->
    <div class="bg-white rounded-[2rem] shadow-xl shadow-gray-200/50 border border-gray-100 overflow-hidden">
      <div class="p-6 sm:p-10">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-xl font-bold flex items-center gap-2">
            ✨ 기본 정보 입력
          </h2>
          <button id="randomFillBtn" type="button" class="text-sm flex items-center gap-1.5 text-gray-500 hover:text-purple-600 transition-colors bg-gray-50 px-3 py-1.5 rounded-full">
            🎲 알아서 채우기
          </button>
        </div>

        <form id="generateForm" class="space-y-8">
          
          <!-- Name & Keyword -->
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">이름 / 닉네임 <span class="text-pink-500">*</span></label>
              <input type="text" id="name" required placeholder="예: 지은, 제이" class="w-full px-4 py-3.5 rounded-xl border border-gray-200 focus:ring-4 focus:ring-pink-50 focus:border-pink-500 transition-all bg-gray-50 focus:bg-white outline-none">
            </div>
            <div>
              <label class="block text-sm font-semibold text-gray-700 mb-2">관심사 / 키워드</label>
              <input type="text" id="keywords" placeholder="예: 카페, 필름카메라" class="w-full px-4 py-3.5 rounded-xl border border-gray-200 focus:ring-4 focus:ring-pink-50 focus:border-pink-500 transition-all bg-gray-50 focus:bg-white outline-none">
            </div>
          </div>

          <!-- Category -->
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-3">계정의 목적이 무엇인가요?</label>
            <select id="category" class="w-full px-4 py-3.5 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white outline-none cursor-pointer">
              <option value="daily">일상/본계정 📱</option>
              <option value="fashion">패션/OOTD 👗</option>
              <option value="food">맛집/카페 ☕</option>
              <option value="travel">여행/풍경 ✈️</option>
              <option value="tech">IT/개발자 💻</option>
              <option value="art">디자인/창작 🎨</option>
              <option value="pet">반려동물 🐾</option>
              <option value="fanpage">덕질/팬계정 🎤</option>
            </select>
          </div>

          <!-- Vibe -->
          <div>
            <label class="block text-sm font-semibold text-gray-700 mb-3">원하는 아이디의 분위기</label>
            <select id="vibe" class="w-full px-4 py-3.5 rounded-xl border border-gray-200 bg-gray-50 focus:bg-white outline-none cursor-pointer">
              <option value="aesthetic">감성적인 (Aesthetic) ✨</option>
              <option value="y2k">Y2K / 레트로 🛼</option>
              <option value="minimal">깔끔 / 미니멀 🤍</option>
              <option value="baddie">힙하고 강렬한 (Baddie) 🖤</option>
              <option value="cute">귀엽고 뽀짝한 🧸</option>
              <option value="clever">재치있는/언어유희 🤪</option>
              <option value="pro">전문적인/신뢰감 💼</option>
            </select>
          </div>

          <!-- Advanced Settings -->
          <div class="border-t border-gray-100 pt-6">
            <h3 class="text-sm font-semibold text-gray-600 mb-4">디테일 설정 (특수기호 등)</h3>
            <div class="bg-gray-50 rounded-xl p-4 space-y-3">
              <label class="flex items-center justify-between cursor-pointer">
                <span class="text-sm text-gray-700 font-medium">숫자 (0-9) 포함 허용</span>
                <input type="checkbox" id="useNumbers" checked class="w-5 h-5 accent-pink-500">
              </label>
              <label class="flex items-center justify-between cursor-pointer">
                <span class="text-sm text-gray-700 font-medium">밑줄 (_) 포함 허용</span>
                <input type="checkbox" id="useUnderscores" checked class="w-5 h-5 accent-pink-500">
              </label>
              <label class="flex items-center justify-between cursor-pointer">
                <span class="text-sm text-gray-700 font-medium">마침표 (.) 포함 허용</span>
                <input type="checkbox" id="usePeriods" checked class="w-5 h-5 accent-pink-500">
              </label>
            </div>
          </div>

          <!-- Submit Button -->
          <button type="submit" id="submitBtn" class="w-full relative overflow-hidden flex items-center justify-center py-4 px-8 rounded-2xl text-white font-bold text-lg transition-all duration-300 bg-gray-900 hover:bg-black hover:shadow-xl hover:shadow-pink-500/20 hover:-translate-y-1" style="min-height: 60px;">
            <span id="btnText">✨ 나만의 아이디 생성하기</span>
            <span id="loadingText" class="hidden-custom animate-pulse">AI가 분석중입니다...</span>
          </button>
        </form>
      </div>
    </div>

    <!-- Error Section -->
    <div id="errorBox" class="hidden-custom items-start p-4 bg-red-50 rounded-2xl text-red-700 border border-red-100">
      <p id="errorMessage" class="text-sm font-medium">오류가 발생했습니다.</p>
    </div>

    <!-- Results Section -->
    <div id="resultsContainer" class="hidden-custom bg-white rounded-[2rem] shadow-xl shadow-gray-200/50 border border-gray-100 p-6 sm:p-10 animate-fade-in-up mt-8">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-2xl font-extrabold text-gray-900 flex items-center">
          <span class="text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-600 mr-2">Pick Your</span>Username
        </h3>
      </div>
      <div id="resultsList" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
        <!-- 결과가 여기에 동적으로 들어갑니다 -->
      </div>
    </div>
  </div>

  <!-- Footer (Sean Woo 제작 명시) -->
  <p class="mt-12 text-sm font-medium text-gray-400">
    Designed & Developed by <a href="https://itmanual.net" target="_blank" class="text-pink-500 hover:text-pink-600 underline decoration-pink-200 underline-offset-4">Sean Woo of ITmanual.net</a>
  </p>

  <script>
    // 알아서 채우기 기능
    document.getElementById('randomFillBtn').addEventListener('click', () => {
      const names = ['지은', '제이', '민수', 'Alex', 'Chloe'];
      const keywords = ['필름카메라, 노을', '코딩, 커피', '빈티지, LP', '헬스, 다이어트', '고양이, 낮잠'];
      
      document.getElementById('name').value = names[Math.floor(Math.random() * names.length)];
      document.getElementById('keywords').value = keywords[Math.floor(Math.random() * keywords.length)];
      
      const categories = ['daily', 'fashion', 'food', 'travel', 'tech', 'art', 'pet', 'fanpage'];
      const vibes = ['aesthetic', 'y2k', 'minimal', 'baddie', 'cute', 'clever', 'pro'];
      
      document.getElementById('category').value = categories[Math.floor(Math.random() * categories.length)];
      document.getElementById('vibe').value = vibes[Math.floor(Math.random() * vibes.length)];
      
      document.getElementById('useNumbers').checked = Math.random() > 0.5;
      document.getElementById('useUnderscores').checked = Math.random() > 0.5;
      document.getElementById('usePeriods').checked = Math.random() > 0.5;
    });

    // 폼 제출 기능 (백엔드 API 호출)
    document.getElementById('generateForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('name').value;
      if (!name.trim()) return;

      const submitBtn = document.getElementById('submitBtn');
      const btnText = document.getElementById('btnText');
      const loadingText = document.getElementById('loadingText');
      const resultsContainer = document.getElementById('resultsContainer');
      const errorBox = document.getElementById('errorBox');
      const errorMessage = document.getElementById('errorMessage');
      const resultsList = document.getElementById('resultsList');

      // 로딩 상태 시작
      submitBtn.classList.add('bg-gray-400', 'cursor-not-allowed');
      submitBtn.classList.remove('bg-gray-900', 'hover:bg-black', 'hover:-translate-y-1');
      btnText.classList.add('hidden-custom');
      loadingText.classList.remove('hidden-custom');
      errorBox.classList.add('hidden-custom');
      resultsContainer.classList.add('hidden-custom');
      submitBtn.disabled = true;

      try {
        // Vercel의 백엔드 API(/api/generate)로 데이터 전송 (API 키 없음!)
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name: name,
            keywords: document.getElementById('keywords').value,
            categoryLabel: document.getElementById('category').options[document.getElementById('category').selectedIndex].text,
            vibeLabel: document.getElementById('vibe').options[document.getElementById('vibe').selectedIndex].text,
            useNumbers: document.getElementById('useNumbers').checked,
            useUnderscores: document.getElementById('useUnderscores').checked,
            usePeriods: document.getElementById('usePeriods').checked
          })
        });

        if (!response.ok) throw new Error('API 서버 오류가 발생했습니다.');

        const data = await response.json();
        
        if (data.error) throw new Error(data.error);
        if (!data.ids || data.ids.length === 0) throw new Error('결과를 생성하지 못했습니다.');

        // 결과 렌더링
        resultsList.innerHTML = '';
        data.ids.forEach(id => {
          const div = document.createElement('div');
          div.className = 'group relative flex items-center justify-between p-4 bg-gray-50 rounded-xl border border-transparent hover:border-pink-200 hover:bg-pink-50/50 transition-all duration-200';
          div.innerHTML = `
            <div class="flex items-center overflow-hidden">
              <span class="text-gray-400 mr-2 font-mono">@</span>
              <span class="font-semibold text-gray-800 text-lg truncate">${id}</span>
            </div>
            <button onclick="copyToClipboard('${id}', this)" class="ml-2 px-3 py-1.5 rounded-lg text-sm bg-white text-gray-500 shadow-sm border border-gray-200 hover:text-pink-600 transition-all">복사</button>
          `;
          resultsList.appendChild(div);
        });
        
        resultsContainer.classList.remove('hidden-custom');

      } catch (err) {
        console.error(err);
        errorMessage.textContent = err.message || "아이디 생성 중 문제가 발생했습니다.";
        errorBox.classList.remove('hidden-custom');
        errorBox.classList.add('flex');
      } finally {
        // 로딩 상태 종료
        submitBtn.classList.remove('bg-gray-400', 'cursor-not-allowed');
        submitBtn.classList.add('bg-gray-900', 'hover:bg-black', 'hover:-translate-y-1');
        btnText.classList.remove('hidden-custom');
        loadingText.classList.add('hidden-custom');
        submitBtn.disabled = false;
      }
    });

    // 클립보드 복사 함수
    window.copyToClipboard = function(text, btnElement) {
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text);
      } else {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try { document.execCommand('copy'); } catch (err) {}
        textArea.remove();
      }
      
      const originalText = btnElement.innerText;
      btnElement.innerText = "완료!";
      btnElement.classList.add("bg-green-500", "text-white", "border-transparent");
      btnElement.classList.remove("bg-white", "text-gray-500", "border-gray-200");
      
      setTimeout(() => {
        btnElement.innerText = originalText;
        btnElement.classList.remove("bg-green-500", "text-white", "border-transparent");
        btnElement.classList.add("bg-white", "text-gray-500", "border-gray-200");
      }, 2000);
    };
  </script>
</body>
</html>
